name: CI

on:
  pull_request:

permissions:
  contents: read

jobs:
  wasm:
    name: Build WASM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Build WASM
        run: zig build wasm
